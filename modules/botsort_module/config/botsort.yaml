# botsort_module/config/botsort.yaml
# Default BoT-SORT tracker configuration (matches ultralytics botsort.yaml).
# These are the same values used by the project's model.track() calls.
# Override any key via BotSortTracker(cfg_overrides={...}).

tracker_type: botsort

# --- Detection thresholds ---
# Detections above this score are considered high-confidence
track_high_thresh: 0.5
# Detections below this score are discarded entirely
track_low_thresh: 0.1
# Minimum score for a new track to be initialised
new_track_thresh: 0.6

# --- Lifecycle ---
# Frames a lost track can be kept before deletion (hallucination budget)
track_buffer: 30

# --- Association ---
# IoU threshold for matching tracks to detections
match_thresh: 0.8
# Fuse detection score into the matching cost (recommended: true)
fuse_score: true

# --- ReID (appearance features) ---
# Set true only if a video path and ReID weights are supplied
with_reid: false
# Min IoU for a candidate to be considered for ReID matching
proximity_thresh: 0.5
# Max cosine distance for a ReID feature match to be accepted
appearance_thresh: 0.25
# Pre-trained ReID model weights (only used when with_reid: true)
model_weights: osnet_x0_25_msmt17.pt
